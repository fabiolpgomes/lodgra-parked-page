 <!DOCTYPE html>                                                            
  <html lang="pt">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lodgra - Launching Q2 2026</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
  Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }

      .container {
        text-align: center;
        padding: 40px 20px;
        max-width: 600px;
      }

      .logo {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 10px;
        font-weight: 600;
      }

      p {
        font-size: 18px;
        color: #aaa;
        margin-bottom: 30px;
      }

      .badge {
        display: inline-block;
        background: rgba(102, 126, 234, 0.1);
        border: 1px solid #667eea;
        color: #667eea;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 14px;
        margin-top: 20px;
      }

      footer {
        margin-top: 60px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">LODGRA</div>
      <h1>Coming Soon</h1>
      <p>The Intelligence Platform for Short-Term Rental Management</p>

      <div class="badge">🚀 Launching Q2 2026</div>

      <footer>
        <p>© 2026 Lodgra. All rights reserved.</p>
      </footer>
    </div>
  </body>
  </html>
